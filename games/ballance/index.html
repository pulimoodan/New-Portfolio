<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<script src="/scripts/analytics.js"></script>
<title>BALANCE — keep the cargo aboard</title>
<style>
  :root { color-scheme: light; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%; overflow: hidden;
    background: #eef0f3;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  #wrap {
    position: fixed; inset: 10px; bottom: 44px;
    display: grid; place-items: center;
    border: 1px solid #dcdee3; border-radius: 10px;
    overflow: hidden;
    background: #ffffff;
  }
  canvas { display: block; }
  #band {
    position: fixed; left: 10px; right: 10px; bottom: 0; height: 44px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    color: rgba(24,26,33,0.4);
    touch-action: auto;
  }
  #band a { color: rgba(24,26,33,0.85); text-decoration: underline; }
  #debug {
    position: fixed; left: 22px; bottom: 56px;
    display: flex; align-items: center; gap: 5px;
    font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
    color: rgba(24,26,33,0.38);
    cursor: pointer; touch-action: auto; z-index: 2;
  }
  #debug input { accent-color: #e5342b; width: 11px; height: 11px; cursor: pointer; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<label id="debug"><input type="checkbox" id="dbg"> HITBOXES</label>
<div id="band">BREWED CAREFULLY BY <a href="../../index.html">AKBAR ALI</a></div>
<script>
(() => {
  'use strict';

  // Dev-only switches. Ship with DEBUG=false: the hitbox toggle never renders in production.
  const DEBUG = false;

  // ---------- tuning ----------
  // The whole game keys off these. Physics numbers are in WORLD pixels (the camera
  // scales world→screen), and time is in seconds.
  const T = {
    G: 2100,               // gravity — how fast a dropped piece falls onto the stack
    platHW: 118, platHH: 13,   // the beam: half-width, half-height
    maxTilt: 0.44,         // hard limit on how far you can tip it (rad, ~25°)
    tiltStiff: 62, tiltDamp: 14, maxTiltW: 5.2,   // the beam is a critically-damped spring
                           // toward your input, so flicks overshoot and it feels weighty
    mu: 0.98,              // friction. High: pieces GRIP the beam and get carried when you
                           // tilt, right up until the slope beats the grip and they slide
    velIters: 12,          // sequential-impulse iterations per substep — the stack's stiffness
    beta: 0.2, slop: 0.5,  // Baumgarte penetration recovery (bias + allowed overlap)
    dropHeight: 96,        // how far above the stack a new piece appears
    settleSpeed: 28, settleTime: 0.24, settleTimeout: 2.4,
    spawnDelay: 0.16,
    failY: 165,            // world-y below the pivot at which a piece has "fallen off"
    basePoints: 10, comboStep: 0.25, saveBonus: 60,
    dangerOn: 0.60, dangerSafe: 0.40, saveDepth: 0.80,   // creak / combo-break / save thresholds
    waterline: 14,         // world-y of the calm sea surface — she rides with the belly wet
  };

  // ---------- canvas ----------
  const cvs = document.getElementById('c');
  const ctx = cvs.getContext('2d');
  let W = 0, H = 0, DPR = 1, pivotScreenY = 0;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    const wrap = document.getElementById('wrap');
    W = wrap.clientWidth; H = wrap.clientHeight;
    cvs.width = W * DPR; cvs.height = H * DPR;
    cvs.style.width = W + 'px'; cvs.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    pivotScreenY = H * 0.80;   // the fulcrum lives here on screen; the tower rises above it
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- audio ----------
  // Everything is synthesised — no assets. The point of the OVERVIEW is that sound is tied
  // to the physics: impact volume/pitch scale with collision force, the creak rises with sway.
  let AC = null;
  function ac() {
    if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
    if (AC.state === 'suspended') AC.resume();
    return AC;
  }
  function beep(freq, dur, vol, type, glideTo) {
    const a = ac();
    const o = a.createOscillator(), g = a.createGain();
    o.type = type || 'triangle'; o.frequency.value = freq;
    if (glideTo) o.frequency.exponentialRampToValueAtTime(glideTo, a.currentTime + dur);
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + dur);
    o.connect(g); g.connect(a.destination);
    o.start(); o.stop(a.currentTime + dur);
  }
  function noiseBurst(dur, vol, hz, q) {
    const a = ac();
    const buf = a.createBuffer(1, Math.max(1, a.sampleRate * dur), a.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const src = a.createBufferSource(); src.buffer = buf;
    const f = a.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = hz; f.Q.value = q || 0.8;
    const g = a.createGain(); g.gain.value = vol;
    src.connect(f); f.connect(g); g.connect(a.destination);
    src.start();
  }
  // A block landing on wood: a low thud whose weight scales with how hard it hit.
  function sndThud(force) {
    const f = Math.min(1, force);
    beep(70 + f * 40, 0.09 + f * 0.05, 0.05 + f * 0.14, 'sine', 46 + f * 20);
    noiseBurst(0.05 + f * 0.05, 0.05 + f * 0.14, 240 + f * 220, 0.9);
  }
  const sndPlace = () => beep(440, 0.05, 0.06, 'triangle', 560);          // clean settle
  const sndSave  = () => { beep(680, 0.09, 0.13, 'sine', 900);            // the reward chime
                           setTimeout(() => beep(1020, 0.14, 0.11, 'sine', 1360), 70);
                           setTimeout(() => beep(1360, 0.12, 0.07, 'sine', 1600), 150); };
  const sndShatter = () => { noiseBurst(0.18, 0.16, 2600, 0.6);           // combo breaks
                             beep(300, 0.14, 0.08, 'square', 120); };
  const sndTick = () => beep(900, 0.03, 0.05, 'square');                  // count-up on death
  function sndTopple() {
    noiseBurst(0.4, 0.22, 180, 0.5);
    beep(150, 0.5, 0.14, 'sawtooth', 55);
  }
  // The creak: a wood-groan that lives while the stack sways past the danger line, so the
  // ear warns you before the eye sees a piece leave. Started/stopped like a held tone.
  let creakOsc = null, creakGain = null, creakFilt = null;
  function startCreak() {
    if (creakOsc) return;
    const a = ac();
    creakOsc = a.createOscillator(); creakGain = a.createGain(); creakFilt = a.createBiquadFilter();
    creakOsc.type = 'sawtooth'; creakOsc.frequency.value = 70;
    creakFilt.type = 'lowpass'; creakFilt.frequency.value = 500;
    creakGain.gain.value = 0.0001;
    creakOsc.connect(creakFilt); creakFilt.connect(creakGain); creakGain.connect(a.destination);
    creakOsc.start();
  }
  function updateCreak(d) {
    if (!creakOsc) return;
    const a = ac();
    // Above the danger line the groan gets louder and climbs — a rope about to snap.
    const x = Math.max(0, (d - 0.5) / 0.5);
    creakGain.gain.setTargetAtTime(0.02 + x * 0.09, a.currentTime, 0.05);
    creakOsc.frequency.setTargetAtTime(60 + x * 90 + Math.sin(a.currentTime * 30) * x * 20, a.currentTime, 0.05);
  }
  function stopCreak() {
    if (!creakOsc) return;
    const a = ac(), o = creakOsc, g = creakGain;
    g.gain.setTargetAtTime(0.0001, a.currentTime, 0.05);
    o.stop(a.currentTime + 0.2);
    creakOsc = null; creakGain = null; creakFilt = null;
  }

  // ---------- math ----------
  const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
  const lerp = (a, b, t) => a + (b - a) * t;
  const dot = (a, b) => a.x * b.x + a.y * b.y;

  function hsl2rgb(h, s, l) {
    const k = n => (n + h / 30) % 12;
    const a = s * Math.min(l, 1 - l);
    const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
    return [Math.round(f(0) * 255), Math.round(f(8) * 255), Math.round(f(4) * 255)];
  }
  // Pieces climb a slow hue ramp as the tower grows, so height reads as colour too.
  const colorFor = (i) => hsl2rgb((196 + i * 15) % 360, 0.52, 0.62);

  // The piece sprite is a little painted crate, drawn as an SVG and tinted with the piece's
  // colour so the hue ramp survives. One rasterised image is cached per colour (the ramp
  // repeats, so the set is small) and pre-warmed at startup — no load-flash mid-run. The
  // artwork is deliberately stretch-tolerant: bevels and seams stay readable at any width.
  const boxCache = new Map();
  function boxSprite(rgb) {
    const key = rgb.join(',');
    let img = boxCache.get(key);
    if (img) return img;
    const [r, g, b] = rgb;
    const rgbS = (m, add) => `rgb(${clamp(r * m + (add || 0), 0, 255) | 0},${clamp(g * m + (add || 0), 0, 255) | 0},${clamp(b * m + (add || 0), 0, 255) | 0})`;
    const top = rgbS(1, 40), base = rgbS(0.9), edge = rgbS(0.58), bolt = rgbS(0.7);
    const svg =
      `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 44'>` +
      `<defs><linearGradient id='g' x1='0' y1='0' x2='0' y2='1'>` +
      `<stop offset='0' stop-color='${top}'/><stop offset='1' stop-color='${base}'/></linearGradient></defs>` +
      `<rect x='1.5' y='1.5' width='97' height='41' rx='6' fill='url(#g)' stroke='${edge}' stroke-width='2.5'/>` +
      // the crate's inner frame — two verticals and the border read as slats when stretched
      `<rect x='7' y='7' width='86' height='30' rx='3' fill='none' stroke='${edge}' stroke-width='2' opacity='0.55'/>` +
      `<line x1='34' y1='7' x2='34' y2='37' stroke='${edge}' stroke-width='2' opacity='0.45'/>` +
      `<line x1='66' y1='7' x2='66' y2='37' stroke='${edge}' stroke-width='2' opacity='0.45'/>` +
      // top bevel highlight and a soft bottom shade for volume
      `<rect x='6' y='4' width='88' height='4' rx='2' fill='rgba(255,255,255,0.30)'/>` +
      `<rect x='1.5' y='31' width='97' height='11' rx='6' fill='rgba(0,0,0,0.12)'/>` +
      // corner bolts
      `<circle cx='11' cy='11' r='2' fill='${bolt}'/><circle cx='89' cy='11' r='2' fill='${bolt}'/>` +
      `<circle cx='11' cy='33' r='2' fill='${bolt}'/><circle cx='89' cy='33' r='2' fill='${bolt}'/>` +
      `</svg>`;
    img = new Image();
    img.src = 'data:image/svg+xml,' + encodeURIComponent(svg);
    boxCache.set(key, img);
    return img;
  }

  // ---------- rigid bodies ----------
  // An oriented box: centre, angle, linear + angular velocity, and inverse mass/inertia
  // (zero = immovable, used for the beam). Everything else is visual state.
  let blocks = [];
  let activeBlock = null;   // the one piece currently falling / being placed
  let pieceIndex = 0;

  function makeBody(x, y, hw, hh) {
    const mass = (hw * hh * 4) * 0.0016;
    const I = mass * ((2 * hw) ** 2 + (2 * hh) ** 2) / 12;
    return {
      pos: { x, y }, angle: 0, vel: { x: 0, y: 0 }, w: 0,
      hw, hh, invMass: 1 / mass, invI: 1 / I,
      color: [180, 180, 180], sq: 0, active: false, landed: false,
      speedPre: 0, hadContact: false, settleT: 0, landAge: 0,
    };
  }

  // The beam: immovable (invMass 0) and rotated about the pivot at world origin by the player.
  // Its physics width runs the FULL interior floor, out to the visual corners — wider than
  // T.platHW, which is the art's flat-deck span that the hull curves hang from.
  const platform = {
    pos: { x: 0, y: 0 }, angle: 0, vel: { x: 0, y: 0 }, w: 0,
    hw: T.platHW + 21, hh: T.platHH, invMass: 0, invI: 0,
  };
  let platformW = 0;

  // The upswept tips are SOLID: two small static bumpers ride the ends of the deck, so the
  // hitbox at the corners matches the vector's raised rim — everywhere else it stays at the
  // flat deck below. Cargo is held in by the boat's own ends until the heel lifts it over.
  const TIP = { lx: T.platHW + 22, ly: -T.platHH - 5, hw: 0.5, hh: 6, ang: 0.10 };   // a thin 1px wall at each visual corner
  const bumpers = [-1, 1].map(side => ({
    pos: { x: 0, y: 0 }, angle: 0, vel: { x: 0, y: 0 }, w: 0,
    hw: TIP.hw, hh: TIP.hh, invMass: 0, invI: 0, side,
  }));
  function syncBumpers() {
    const c = Math.cos(platform.angle), s = Math.sin(platform.angle);
    for (const b of bumpers) {
      const lx = TIP.lx * b.side, ly = TIP.ly;
      b.pos.x = lx * c - ly * s;
      b.pos.y = lx * s + ly * c;
      b.angle = platform.angle - TIP.ang * b.side;   // swept up toward the tip
      // Rigidly attached to the boat: a point on the tip moves with the roll about the
      // ORIGIN, so give the body the matching velocity field (vel = ω × pos, w = ω).
      b.vel.x = -platformW * b.pos.y;
      b.vel.y = platformW * b.pos.x;
      b.w = platformW;
    }
  }

  function corners(b) {
    const c = Math.cos(b.angle), s = Math.sin(b.angle);
    const ux = { x: c, y: s }, uy = { x: -s, y: c }, hw = b.hw, hh = b.hh;
    return [
      { x: b.pos.x + ux.x * hw + uy.x * hh, y: b.pos.y + ux.y * hw + uy.y * hh },
      { x: b.pos.x - ux.x * hw + uy.x * hh, y: b.pos.y - ux.y * hw + uy.y * hh },
      { x: b.pos.x - ux.x * hw - uy.x * hh, y: b.pos.y - ux.y * hw - uy.y * hh },
      { x: b.pos.x + ux.x * hw - uy.x * hh, y: b.pos.y + ux.y * hw - uy.y * hh },
    ];
  }
  function project(cs, ax) {
    let mn = Infinity, mx = -Infinity;
    for (const c of cs) { const d = c.x * ax.x + c.y * ax.y; if (d < mn) mn = d; if (d > mx) mx = d; }
    return [mn, mx];
  }
  // The face of a box whose outward normal best aligns (max) or anti-aligns (min) with dir.
  function bestFace(cs, center, dir, want) {
    let best = -Infinity, bi = 0, bn = { x: 0, y: 0 };
    for (let i = 0; i < 4; i++) {
      const a = cs[i], b = cs[(i + 1) % 4];
      let nx = b.y - a.y, ny = -(b.x - a.x);
      const L = Math.hypot(nx, ny) || 1; nx /= L; ny /= L;
      const mx = (a.x + b.x) / 2 - center.x, my = (a.y + b.y) / 2 - center.y;
      if (nx * mx + ny * my < 0) { nx = -nx; ny = -ny; }   // force outward
      let score = nx * dir.x + ny * dir.y;
      if (want === 'min') score = -score;
      if (score > best) { best = score; bi = i; bn = { x: nx, y: ny }; }
    }
    return { v1: cs[bi], v2: cs[(bi + 1) % 4], n: bn };
  }
  // Clip the incident segment to the reference face's side planes (Sutherland-Hodgman in 1D).
  function clipIncident(i1, i2, t, lo, hi) {
    const d1 = i1.x * t.x + i1.y * t.y, d2 = i2.x * t.x + i2.y * t.y;
    let s0 = 0, s1 = 1;
    if (Math.abs(d2 - d1) > 1e-9) {
      const sa = (lo - d1) / (d2 - d1), sb = (hi - d1) / (d2 - d1);
      s0 = Math.max(0, Math.min(sa, sb)); s1 = Math.min(1, Math.max(sa, sb));
      if (s0 > s1) return [];
    } else if (d1 < lo || d1 > hi) return [];
    const at = s => ({ x: i1.x + (i2.x - i1.x) * s, y: i1.y + (i2.y - i1.y) * s });
    const out = [at(s0)];
    if (s1 > s0 + 1e-6) out.push(at(s1));
    return out;
  }
  // SAT + reference/incident clipping → a 1- or 2-point contact manifold. Two-point manifolds
  // for face contacts are the whole reason a stack of boxes rests still instead of jittering.
  function collide(A, B) {
    const ca = corners(A), cb = corners(B);
    const axes = [];
    { const c = Math.cos(A.angle), s = Math.sin(A.angle); axes.push({ x: c, y: s, own: 'A' }, { x: -s, y: c, own: 'A' }); }
    { const c = Math.cos(B.angle), s = Math.sin(B.angle); axes.push({ x: c, y: s, own: 'B' }, { x: -s, y: c, own: 'B' }); }
    let minPen = Infinity, mtv = null, own = 'A';
    for (const ax of axes) {
      const [amn, amx] = project(ca, ax), [bmn, bmx] = project(cb, ax);
      const pen = Math.min(amx - bmn, bmx - amn);
      if (pen <= 0) return null;                 // a separating axis: no contact
      if (pen < minPen) { minPen = pen; mtv = ax; own = ax.own; }
    }
    const ref = own === 'A' ? A : B, inc = own === 'A' ? B : A;
    const refC = own === 'A' ? ca : cb, incC = own === 'A' ? cb : ca;
    let n = { x: mtv.x, y: mtv.y };
    if (dot({ x: inc.pos.x - ref.pos.x, y: inc.pos.y - ref.pos.y }, n) < 0) { n.x = -n.x; n.y = -n.y; }
    const rf = bestFace(refC, ref.pos, n, 'max');
    const inf = bestFace(incC, inc.pos, n, 'min');
    let t = { x: rf.v2.x - rf.v1.x, y: rf.v2.y - rf.v1.y };
    const tl = Math.hypot(t.x, t.y) || 1; t.x /= tl; t.y /= tl;
    const lo = dot(rf.v1, t), hi = dot(rf.v2, t);
    const clipped = clipIncident(inf.v1, inf.v2, t, Math.min(lo, hi), Math.max(lo, hi));
    const contacts = [];
    for (const p of clipped) {
      const sep = n.x * (p.x - rf.v1.x) + n.y * (p.y - rf.v1.y);
      if (sep <= 0.05) contacts.push({ p: { x: p.x, y: p.y }, depth: -sep, Pn: 0, Pt: 0 });
    }
    if (!contacts.length)
      contacts.push({ p: { x: (inf.v1.x + inf.v2.x) / 2, y: (inf.v1.y + inf.v2.y) / 2 }, depth: minPen, Pn: 0, Pt: 0 });
    return { A: ref, B: inc, n, contacts };
  }

  function solveManifold(m, h) {
    const A = m.A, B = m.B, n = m.n, tv = { x: -n.y, y: n.x };
    for (const c of m.contacts) {
      const rA = { x: c.p.x - A.pos.x, y: c.p.y - A.pos.y };
      const rB = { x: c.p.x - B.pos.x, y: c.p.y - B.pos.y };
      // relative velocity at the contact = (vB + wB×rB) − (vA + wA×rA)
      let rvx = (B.vel.x - B.w * rB.y) - (A.vel.x - A.w * rA.y);
      let rvy = (B.vel.y + B.w * rB.x) - (A.vel.y + A.w * rA.x);
      const vn = rvx * n.x + rvy * n.y;
      const rnA = rA.x * n.y - rA.y * n.x, rnB = rB.x * n.y - rB.y * n.x;
      const kn = A.invMass + B.invMass + A.invI * rnA * rnA + B.invI * rnB * rnB;
      const bias = (T.beta / h) * Math.max(c.depth - T.slop, 0);   // push out overlap, gently
      let dPn = (-vn + bias) / kn;
      const Pn0 = c.Pn; c.Pn = Math.max(Pn0 + dPn, 0); dPn = c.Pn - Pn0;   // impulse can only push
      const inx = dPn * n.x, iny = dPn * n.y;
      A.vel.x -= inx * A.invMass; A.vel.y -= iny * A.invMass; A.w -= A.invI * (rA.x * iny - rA.y * inx);
      B.vel.x += inx * B.invMass; B.vel.y += iny * B.invMass; B.w += B.invI * (rB.x * iny - rB.y * inx);
      // friction, clamped to the Coulomb cone μ·Pn
      rvx = (B.vel.x - B.w * rB.y) - (A.vel.x - A.w * rA.y);
      rvy = (B.vel.y + B.w * rB.x) - (A.vel.y + A.w * rA.x);
      const vt = rvx * tv.x + rvy * tv.y;
      const rtA = rA.x * tv.y - rA.y * tv.x, rtB = rB.x * tv.y - rB.y * tv.x;
      const kt = A.invMass + B.invMass + A.invI * rtA * rtA + B.invI * rtB * rtB;
      let dPt = -vt / kt;
      const maxF = T.mu * c.Pn, Pt0 = c.Pt;
      c.Pt = clamp(Pt0 + dPt, -maxF, maxF); dPt = c.Pt - Pt0;
      const itx = dPt * tv.x, ity = dPt * tv.y;
      A.vel.x -= itx * A.invMass; A.vel.y -= ity * A.invMass; A.w -= A.invI * (rA.x * ity - rA.y * itx);
      B.vel.x += itx * B.invMass; B.vel.y += ity * B.invMass; B.w += B.invI * (rB.x * ity - rB.y * itx);
    }
  }

  function stepPhysics(h) {
    // The beam chases your input like a critically-damped spring. Its angular velocity is
    // real, so friction drags the pieces along when you tilt — that's the whole control.
    let target = currentTargetTilt();
    if (state !== DEAD) target = clamp(target, -T.maxTilt, T.maxTilt);   // capsize breaks the limit
    platformW += (T.tiltStiff * (target - platform.angle) - T.tiltDamp * platformW) * h;
    platformW = clamp(platformW, -T.maxTiltW, T.maxTiltW);
    platform.angle += platformW * h;
    platform.w = platformW;

    syncBumpers();
    for (const b of blocks) { b.vel.y += T.G * h; b.hadContact = false; }
    if (activeBlock) activeBlock.speedPre = Math.hypot(activeBlock.vel.x, activeBlock.vel.y);

    const M = [];
    for (let i = 0; i < blocks.length; i++) {
      const bi = blocks[i];
      for (const st of [platform, bumpers[0], bumpers[1]]) {
        const mp = collide(bi, st);
        if (mp) { M.push(mp); bi.hadContact = true; }
      }
      for (let j = i + 1; j < blocks.length; j++) {
        const bj = blocks[j], reach = bi.hw + bi.hh + bj.hw + bj.hh;
        if (Math.abs(bi.pos.x - bj.pos.x) > reach || Math.abs(bi.pos.y - bj.pos.y) > reach) continue;
        const m = collide(bi, bj);
        if (m) { M.push(m); bi.hadContact = true; bj.hadContact = true; }
      }
    }
    for (let it = 0; it < T.velIters; it++) for (const m of M) solveManifold(m, h);
    for (const b of blocks) { b.pos.x += b.vel.x * h; b.pos.y += b.vel.y * h; b.angle += b.w * h; }
  }

  // ---------- game state ----------
  const MENU = 0, PLAY = 1, DEAD = 2;
  let state = MENU;
  let height = 0, score = 0, combo = 0, best = +(localStorage.getItem('teeter_best') || 0);
  let spawnTimer = 0;
  let dangerT = 0, dangerShown = 0, inDanger = false, maxDangerSeen = 0;
  let shake = 0, saveT = 0, saveFlash = 0, comboGlow = 0, bankFx = 0;
  let deadAt = 0, displayScore = 0, tickAcc = 0;
  let floaters = [];
  let zoom = 1, camY = 0;
  let capsizeDir = 1, waterRise = 0;   // which way she rolls on the way down, and the flood level

  function stackTopY() {
    let top = -T.platHH;
    for (const b of blocks) if (b !== activeBlock || b.landed) top = Math.min(top, b.pos.y - (b.hh + b.hw) * 0.3);
    return top;
  }
  function spawnBlock() {
    const hw = 22 + Math.random() * 18, hh = 14;
    const x = (Math.random() * 2 - 1) * T.platHW * 0.42;   // drops within reach, but off-centre
    const b = makeBody(x, stackTopY() - T.dropHeight - hh, hw, hh);
    b.color = colorFor(pieceIndex++);
    b.active = true;
    activeBlock = b; blocks.push(b);
  }
  function settleActive() {
    const b = activeBlock;
    b.active = false; b.landed = true; activeBlock = null;
    height++;
    const pts = Math.round(T.basePoints * (1 + combo * T.comboStep));
    score += pts; combo++; comboGlow = 1; bankFx = 1;
    floaters.push({ x: b.pos.x, y: b.pos.y, vy: -60, life: 1, text: '+' + pts, color: '#0b7a53', big: false });
    sndPlace();
    if (height > best) { best = height; localStorage.setItem('teeter_best', String(best)); }
    spawnTimer = T.spawnDelay;
  }
  function onLanding(force) {
    const f = clamp(force / 520, 0, 1);
    shake = Math.max(shake, 0.25 + f * 0.75);
    activeBlock.sq = 0.35 + f * 0.5;         // squash on impact, springs back in update
    sndThud(f);
  }
  function breakCombo() {
    if (combo > 1) sndShatter();
    combo = 0;
  }
  function triggerSave() {
    saveT = 0.32; saveFlash = 1;
    score += T.saveBonus;
    floaters.push({ x: activeBlock ? activeBlock.pos.x : 0, y: stackTopY(), vy: -70, life: 1.4, text: 'SAVE +' + T.saveBonus, color: '#b45309', big: true });
    sndSave();
  }
  function triggerFail() {
    // Roll toward the heavy side — whichever way she was already leaning, or where the load sat.
    let mx = 0, mm = 0;
    for (const b of blocks) { const m = 1 / b.invMass; mx += m * b.pos.x; mm += m; }
    capsizeDir = (Math.abs(platform.angle) > 0.05 ? platform.angle : (mm ? mx : 1)) >= 0 ? 1 : -1;
    state = DEAD; deadAt = performance.now();
    shake = 1.1; activeBlock = null;
    displayScore = 0; tickAcc = 0;
    stopCreak();
    sndTopple();
  }

  function startRun() {
    ac();
    blocks = []; activeBlock = null; pieceIndex = 0;
    height = 0; score = 0; combo = 0; floaters = [];
    dangerT = dangerShown = 0; inDanger = false; maxDangerSeen = 0;
    platform.angle = 0; platformW = 0; waterRise = 0;
    zoom = fitZoom(160);
    state = PLAY; spawnTimer = 0.25;
  }
  function buildMenu() {
    // A small live stack that jiggles under a lazy sway — the game demoing itself.
    blocks = []; activeBlock = null; pieceIndex = 0;
    for (let i = 0; i < 3; i++) {
      const b = makeBody((i % 2 ? 10 : -8), -T.platHH - 15 - i * 30, 32 - i * 3, 14);
      b.color = colorFor(i); b.landed = true;
      blocks.push(b);
    }
    state = MENU;
  }

  function currentTargetTilt() {
    if (state === MENU) return Math.sin(performance.now() / 900) * 0.035;   // she rocks at anchor
    if (state === DEAD) return capsizeDir * 1.35;   // roll her all the way over
    return inputTilt();
  }

  // ---------- input ----------
  let pointerTilt = 0, lastPointer = -1e9, keyL = false, keyR = false;
  let orientActive = false, gamma0 = null, gammaNow = 0;
  function inputTilt() {
    if (keyL) return -T.maxTilt;
    if (keyR) return T.maxTilt;
    // Tilt-to-balance takes over on mobile only once you stop dragging the screen.
    if (orientActive && gamma0 !== null && performance.now() - lastPointer > 1000)
      return clamp((gammaNow - gamma0) / 22, -1, 1) * T.maxTilt;
    return pointerTilt;
  }
  function setPointerTilt(clientX) {
    const r = cvs.getBoundingClientRect();
    pointerTilt = clamp((clientX - r.left - r.width / 2) / (r.width * 0.42), -1, 1) * T.maxTilt;
    lastPointer = performance.now();
  }
  function press(e) {
    ac();
    // iOS needs a gesture before it will hand over orientation.
    if (typeof DeviceOrientationEvent !== 'undefined' && DeviceOrientationEvent.requestPermission) {
      DeviceOrientationEvent.requestPermission().catch(() => {});
    }
    if (state === MENU) { startRun(); return; }
    if (state === DEAD) { if (performance.now() - deadAt > 800) { buildMenu(); startRun(); } return; }
    if (state === PLAY) setPointerTilt(e.clientX);
  }
  const band = document.getElementById('band');
  const debugEl = document.getElementById('debug');
  const dbg = document.getElementById('dbg');
  if (!DEBUG) debugEl.remove();   // no hitbox toggle in production
  const overBand = (e) => e.target instanceof Node && (band.contains(e.target) || debugEl.contains(e.target));
  window.addEventListener('pointerdown', (e) => { if (overBand(e)) return; e.preventDefault(); press(e); }, { passive: false });
  window.addEventListener('pointermove', (e) => { if (state === PLAY && (e.buttons || e.pointerType !== 'mouse')) setPointerTilt(e.clientX); });
  window.addEventListener('contextmenu', (e) => e.preventDefault());
  window.addEventListener('keydown', (e) => {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') keyL = true;
    if (e.code === 'ArrowRight' || e.code === 'KeyD') keyR = true;
    if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); if (!e.repeat) press({ clientX: W / 2 }); }
  });
  window.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') keyL = false;
    if (e.code === 'ArrowRight' || e.code === 'KeyD') keyR = false;
  });
  window.addEventListener('deviceorientation', (e) => {
    if (e.gamma === null || e.gamma === undefined) return;
    orientActive = true; gammaNow = e.gamma;
    if (gamma0 === null) gamma0 = e.gamma;   // calibrate neutral to however you're holding it
  });

  // ---------- update ----------
  let acc = 0;
  const STEP = 1 / 120;
  function update(realDt) {
    // Slow-mo on the two moments the OVERVIEW cares about: the save, and the collapse.
    let scale = 1;
    if (saveT > 0) scale = 0.4;
    if (state === DEAD) scale = 0.4;
    const dt = realDt * scale;

    acc += dt;
    let steps = 0;
    while (acc >= STEP && steps < 6) { stepPhysics(STEP); acc -= STEP; steps++; }
    if (acc > STEP) acc = 0;   // don't let a stall spiral

    gameplay(dt);
    updateFx(dt, realDt);
  }

  function gameplay(dt) {
    if (state === PLAY) {
      for (const b of blocks) {
        if (b.pos.y > T.failY || Math.abs(b.pos.x) > 900) { triggerFail(); break; }
      }
    }
    if (state === PLAY && activeBlock) {
      if (!activeBlock.landed && activeBlock.hadContact) onLanding(activeBlock.speedPre), activeBlock.landed = true;
      if (activeBlock && activeBlock.landed) {
        const sp = Math.hypot(activeBlock.vel.x, activeBlock.vel.y) + Math.abs(activeBlock.w) * 22;
        activeBlock.settleT = sp < T.settleSpeed ? activeBlock.settleT + dt : 0;
        activeBlock.landAge += dt;
        if (activeBlock.settleT > T.settleTime || activeBlock.landAge > T.settleTimeout) settleActive();
      }
    }
    if (state === PLAY && !activeBlock) { spawnTimer -= dt; if (spawnTimer <= 0) spawnBlock(); }

    // Danger = how far the stack's centre of mass has drifted off the fulcrum, plus a little
    // for raw tilt so the creak anticipates. One honest number drives creak, combo and save.
    let mx = 0, mm = 0;
    for (const b of blocks) { if (b === activeBlock) continue; const m = 1 / b.invMass; mx += m * b.pos.x; mm += m; }
    const comX = mm > 0 ? mx / mm : 0;
    dangerT = clamp(Math.abs(comX) / T.platHW + Math.abs(platform.angle) / T.maxTilt * 0.12, 0, 1);

    if (state === PLAY) {
      if (!inDanger && dangerT > T.dangerOn) { inDanger = true; maxDangerSeen = dangerT; breakCombo(); }
      if (inDanger) maxDangerSeen = Math.max(maxDangerSeen, dangerT);
      if (inDanger && dangerT < T.dangerSafe) {           // pulled it back from the brink
        inDanger = false;
        if (maxDangerSeen > T.saveDepth) triggerSave();
      }
    }
  }

  function updateFx(dt, realDt) {
    dangerShown += (dangerT - dangerShown) * Math.min(1, 8 * realDt);
    shake = Math.max(0, shake - realDt * 2.6);
    saveT = Math.max(0, saveT - realDt);
    saveFlash = Math.max(0, saveFlash - realDt * 2.2);
    comboGlow = Math.max(0, comboGlow - realDt * 1.6);
    bankFx = Math.max(0, bankFx - realDt * 2.4);
    for (const b of blocks) b.sq *= Math.exp(-14 * realDt);
    for (const f of floaters) { f.y += f.vy * realDt; f.vy *= 0.93; f.life -= realDt * 0.7; }
    floaters = floaters.filter(f => f.life > 0);

    // On death the sea climbs and swallows the wreck; in play it only breathes with the danger.
    const wrTarget = state === DEAD ? 150 : 0;
    waterRise += (wrTarget - waterRise) * Math.min(1, (state === DEAD ? 0.7 : 3) * realDt);

    // Creak audio, tied to the live danger reading. Only while actually playing.
    if (state === PLAY && dangerShown > 0.5) { startCreak(); updateCreak(dangerShown); } else stopCreak();

    // Camera: frame the tower so its top stays near the ceiling. As it grows the fit shrinks —
    // the "camera pulls back" ramp, which also makes the same tilt read as a bigger move.
    let topY = -T.platHH;
    for (const b of blocks) topY = Math.min(topY, b.pos.y - b.hh);
    const target = fitZoom(-topY + 60);
    zoom += (target - zoom) * Math.min(1, 3.5 * realDt);
    camY = state === DEAD ? camY + (-40 - camY) * Math.min(1, 1.2 * realDt) : camY + (0 - camY) * Math.min(1, 4 * realDt);

    // Count the score up on the death screen, ticking as it climbs.
    if (state === DEAD && performance.now() - deadAt > 850 && displayScore < score) {
      tickAcc += realDt;
      const rate = Math.max(1, Math.round(score / 40));
      while (tickAcc > 0.03 && displayScore < score) { displayScore = Math.min(score, displayScore + rate); tickAcc -= 0.03; sndTick(); }
    }
  }

  function fitZoom(worldHeight) {
    const availTop = pivotScreenY - 46;                 // screen room above the fulcrum
    const zH = availTop / Math.max(worldHeight, 150);
    const zW = (W * 0.72) / (2 * T.platHW + 12);
    return clamp(Math.min(zW, zH), 0.16, zW);
  }

  // ---------- draw ----------
  const ink = (a) => `rgba(24,26,33,${a})`;
  const GOLD = '#b45309', RED = '#e5342b', GREEN = '#0b7a53';

  function roundRect(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function type(text, x, y, color, size, weight, sp, align) {
    if ('letterSpacing' in ctx) ctx.letterSpacing = (sp === undefined ? 2 : sp) + 'px';
    ctx.font = `${weight || 700} ${size}px ui-monospace, monospace`;
    ctx.fillStyle = color; ctx.textAlign = align || 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(text, x, y);
    if ('letterSpacing' in ctx) ctx.letterSpacing = '0px';
  }
  function hairline(y, w, alpha) {
    ctx.strokeStyle = ink(alpha); ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(W / 2 - w / 2, y + 0.5); ctx.lineTo(W / 2 + w / 2, y + 0.5); ctx.stroke();
  }
  const blink = () => ((performance.now() / 460) | 0) % 2 === 0;
  function statStrip(items, y) {
    const gap = Math.min(110, (W - 40) / items.length);
    items.forEach(([k, v, color], i) => {
      const x = W / 2 + (i - (items.length - 1) / 2) * gap;
      type(k, x, y, ink(0.32), 9, 700, 1.5);
      type(v, x, y + 21, color || ink(0.82), 15, 700, 0);
      if (i < items.length - 1) {
        ctx.strokeStyle = ink(0.11); ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo((x + gap / 2) + 0.5, y - 7); ctx.lineTo((x + gap / 2) + 0.5, y + 29); ctx.stroke();
      }
    });
  }

  // The effective sea surface in world-y. It breathes upward a touch with the danger, and
  // climbs hard on death — the same one number that drives the creak now literally raises water.
  const effWL = () => T.waterline - dangerShown * 18 - waterRise;

  // The boat is drawn in two layers so the cargo sits INSIDE it: the far wall and interior
  // go down first, the crates draw on top of those, and then the near wall covers a small
  // slice of their bottoms. Shapes traced from the flat-vector dinghy reference: near-flat
  // sheer rising to short upswept tips, a flat belly that turns up fast at the ends. Flat
  // colour bands, no outline. The physics is still just the thin immovable deck at origin.
  const BOAT = { bx: () => T.platHW + 24, by: () => -T.platHH - 12, bot: 28, arch: 15 };

  function drawBoatBack() {
    // The deck opening is a lens: the far rim arches UP amidships while the near sheer dips
    // down. EVERY curve here — far rim, band bottom, near sheer, and the front hull's own
    // sheer — starts and ends on the same two tip points, so nothing can ever misalign at
    // the bow or stern.
    ctx.save();
    ctx.rotate(platform.angle);
    const deck = -T.platHH, bx = BOAT.bx(), by = BOAT.by(), arch = BOAT.arch;
    // interior: everything between the far rim and the near sheer
    ctx.beginPath();
    ctx.moveTo(-bx, by);
    ctx.quadraticCurveTo(0, by - arch, bx, by);      // far rim, arching up
    ctx.quadraticCurveTo(0, deck + 2, -bx, by);      // near sheer, dipping down — back to start
    ctx.closePath();
    ctx.fillStyle = '#23262e'; ctx.fill();           // deep-shadow interior, near-black ink
    // The far rim band: a TRUE constant-offset band under the arch (top and bottom edges are
    // the same curve, 7px apart — like the front band), clipped to the deck opening. In the
    // middle it reads as an even 7px stripe; toward the ends it fills the whole narrowing
    // opening and meets the corner at full width instead of thinning out.
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(-bx, by);
    ctx.quadraticCurveTo(0, by - arch, bx, by);
    ctx.quadraticCurveTo(0, deck + 2, -bx, by);
    ctx.closePath();
    ctx.clip();                                      // the deck opening
    ctx.beginPath();
    ctx.moveTo(-bx, by);
    ctx.quadraticCurveTo(0, by - arch, bx, by);      // top edge = the arch
    ctx.lineTo(bx, by + 7);
    ctx.quadraticCurveTo(0, by - arch + 7, -bx, by + 7);   // bottom edge = arch shifted 7px
    ctx.closePath();
    ctx.fillStyle = '#b3281c'; ctx.fill();   // the arcade red, shaded for the far side
    ctx.restore();
    ctx.restore();
  }

  function drawBoatFront() {
    ctx.save();
    ctx.rotate(platform.angle);
    const hw = T.platHW, deck = -T.platHH;
    const bx = BOAT.bx(), by = BOAT.by(), bot = BOAT.bot;
    const hull = (top) => {                // top: how far below the gunwale this band starts
      ctx.beginPath();
      ctx.moveTo(-bx, by + top);
      ctx.quadraticCurveTo(0, deck + 2 + top, bx, by + top);              // the near-flat sheer
      // Not an arc: the bottom drops fast right at the tip, then runs FLAT across the belly.
      ctx.bezierCurveTo(bx - 10, bot - 6, bx - 26, bot, hw * 0.5, bot);   // quick turn at the bow
      ctx.lineTo(-hw * 0.5, bot);                                         // the flat belly
      ctx.bezierCurveTo(-bx + 26, bot, -bx + 10, bot - 6, -bx, by + top); // and up to the stern
      ctx.closePath();
    };
    hull(0);
    ctx.fillStyle = '#e5342b'; ctx.fill();   // the arcade-red band is the hull; ink covers below
    ctx.save(); hull(0); ctx.clip();
    hull(11);
    ctx.fillStyle = '#343945'; ctx.fill();   // ink body — red stays as the top band + tips
    ctx.strokeStyle = '#eef0f3'; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-bx, by + 11); ctx.quadraticCurveTo(0, deck + 13, bx, by + 11); ctx.stroke();
    ctx.restore();
    ctx.restore();
  }

  function drawWater(wlY) {
    // Two sine bands for a live surface; it darkens and gets choppier the closer she is to going.
    const t = performance.now() / 1000;
    const chop = 2 + dangerShown * 6 + (state === DEAD ? 5 : 0);
    const surfaceY = (x) => wlY + Math.sin(x * 0.028 + t * 1.7) * chop + Math.sin(x * 0.061 - t * 2.5) * chop * 0.45;
    ctx.beginPath();
    ctx.moveTo(0, H); ctx.lineTo(0, surfaceY(0));
    for (let x = 0; x <= W; x += 12) ctx.lineTo(x, surfaceY(x));
    ctx.lineTo(W, H); ctx.closePath();
    const d = clamp(dangerShown, 0, 1);
    const g = ctx.createLinearGradient(0, wlY - 8, 0, H);
    g.addColorStop(0, `rgba(${lerp(132, 82, d) | 0},${lerp(182, 150, d) | 0},${lerp(214, 168, d) | 0},0.74)`);
    g.addColorStop(1, `rgba(${lerp(72, 52, d) | 0},${lerp(126, 102, d) | 0},${lerp(168, 138, d) | 0},0.93)`);
    ctx.fillStyle = g; ctx.fill();
    // foam crest along the surface
    ctx.strokeStyle = 'rgba(255,255,255,0.42)'; ctx.lineWidth = 2;
    ctx.beginPath();
    for (let x = 0; x <= W; x += 12) { const y = surfaceY(x); if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); }
    ctx.stroke();
  }

  function drawBlock(b) {
    const [r, g, bl] = b.color;
    ctx.save();
    ctx.translate(b.pos.x, b.pos.y);
    ctx.rotate(b.angle);
    ctx.scale(1 + b.sq * 0.35, 1 - b.sq * 0.35);   // squash/stretch, biggest right on impact
    const w = b.hw * 2, h = b.hh * 2;
    // soft contact shadow so pieces sit on each other rather than float
    ctx.fillStyle = 'rgba(20,22,28,0.10)';
    roundRect(-b.hw + 2, -b.hh + 3, w, h, 4); ctx.fill();
    const img = boxSprite(b.color);
    if (img.complete && img.naturalWidth) {
      ctx.drawImage(img, -b.hw, -b.hh, w, h);
    } else {
      // until the sprite has decoded, fall back to a flat tinted block
      const grd = ctx.createLinearGradient(0, -b.hh, 0, b.hh);
      grd.addColorStop(0, `rgb(${Math.min(255, r + 34)},${Math.min(255, g + 34)},${Math.min(255, bl + 34)})`);
      grd.addColorStop(1, `rgb(${r * 0.8 | 0},${g * 0.8 | 0},${bl * 0.8 | 0})`);
      ctx.fillStyle = grd;
      roundRect(-b.hw, -b.hh, w, h, 4); ctx.fill();
    }
    // combo glow: the tower rims gold while a streak is alive
    if (comboGlow > 0 && combo > 1) {
      ctx.strokeStyle = `rgba(180,83,9,${comboGlow * 0.7})`;
      ctx.lineWidth = 2;
      roundRect(-b.hw, -b.hh, w, h, 4); ctx.stroke();
    }
    ctx.restore();
  }

  function drawWorld() {
    drawBoatBack();
    // drop guide: a faint line under the falling piece so you can read where it'll land
    if (state === PLAY && activeBlock && !activeBlock.landed) {
      ctx.strokeStyle = ink(0.12); ctx.lineWidth = 1 / zoom; ctx.setLineDash([6 / zoom, 6 / zoom]);
      ctx.beginPath(); ctx.moveTo(activeBlock.pos.x, activeBlock.pos.y); ctx.lineTo(activeBlock.pos.x, -T.platHH); ctx.stroke();
      ctx.setLineDash([]);
    }
    for (const b of blocks) drawBlock(b);
    drawBoatFront();   // the near wall covers a small slice of the cargo — they sit inside
    if (dbg.checked) drawHitboxes();
    for (const f of floaters) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, Math.min(1, f.life));
      ctx.fillStyle = f.color;
      ctx.font = `${f.big ? 800 : 700} ${(f.big ? 22 : 17) / zoom}px ui-monospace, monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(f.text, f.x, f.y);
      ctx.restore();
    }
  }

  // Debug overlay: every physics body as a wireframe, in world space. Statics (deck bar and
  // the two corner walls) in magenta, dynamic crates in green, plus the pivot and fail line.
  function drawHitboxes() {
    const lw = 1.5 / zoom;
    const poly = (b, color) => {
      const cs = corners(b);
      ctx.strokeStyle = color; ctx.lineWidth = lw;
      ctx.beginPath();
      ctx.moveTo(cs[0].x, cs[0].y);
      for (let i = 1; i < 4; i++) ctx.lineTo(cs[i].x, cs[i].y);
      ctx.closePath(); ctx.stroke();
      // centre dot
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(b.pos.x, b.pos.y, 2 / zoom, 0, 6.2832); ctx.fill();
    };
    poly(platform, '#d626c9');
    for (const bp of bumpers) poly(bp, '#d626c9');
    for (const b of blocks) poly(b, '#12b76a');
    // the pivot
    ctx.strokeStyle = '#d626c9'; ctx.lineWidth = lw;
    ctx.beginPath();
    ctx.moveTo(-8 / zoom, 0); ctx.lineTo(8 / zoom, 0);
    ctx.moveTo(0, -8 / zoom); ctx.lineTo(0, 8 / zoom);
    ctx.stroke();
    // the fail line: a piece below this is lost
    ctx.strokeStyle = 'rgba(229,52,43,0.6)'; ctx.setLineDash([8 / zoom, 8 / zoom]);
    ctx.beginPath();
    ctx.moveTo(-W / zoom, T.failY); ctx.lineTo(W / zoom, T.failY);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  function drawVignette() {
    // The danger reading bleeds in from the edges as warmth — peripheral warning, so your
    // eyes can stay on the tower. Holds the alarm colour on the death screen.
    const d = state === DEAD ? 1 : dangerShown;
    if (d < 0.03) return;
    const g = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.3, W / 2, H / 2, Math.max(W, H) * 0.62);
    const a = Math.pow(clamp(d, 0, 1), 1.5) * 0.34;
    g.addColorStop(0, 'rgba(229,52,43,0)');
    g.addColorStop(1, `rgba(${state === DEAD ? '190,30,30' : '229,120,43'},${a})`);
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  }

  function drawHud() {
    type(String(height), 26, 40, ink(0.92), 34, 800, 0, 'left');
    type('CARGO', 26, 68, ink(0.34), 9, 700, 1.5, 'left');
    type(String(score), W - 26, 36, ink(0.6), 18, 700, 0, 'right');
    type('SCORE', W - 26, 58, ink(0.34), 9, 700, 1.5, 'right');
    // combo pill, centred under the score
    if (combo > 1) {
      type('COMBO  x' + (1 + combo * T.comboStep).toFixed(2), W - 26, 84, GOLD, 12, 700, 1, 'right');
    }
    // control hint fades once she's carrying a few pieces
    if (height < 3) type('DRAG / TILT TO TRIM', W / 2, H - 22, ink(0.34), 10, 700, 2);
  }

  function drawMenu() {
    const cy = H * 0.30;
    type('TEETER', W / 2, cy, ink(0.93), 56, 800, 8);
    hairline(cy + 32, 250, 0.14);
    type('LOAD THE BOAT  ·  DON\'T CAPSIZE HER', W / 2, cy + 54, ink(0.42), 10, 700, 2);
    type('DRAG TO TRIM AS THE CARGO STACKS UP', W / 2, cy + 74, ink(0.42), 10, 700, 2);
    if (blink()) type('PRESS TO CAST OFF', W / 2, cy + 120, ink(0.85), 13, 800, 3);
    if (best > 0) type('BEST HAUL  ' + best, W / 2, H - 30, ink(0.3), 10, 700, 2);
  }

  function drawGameOver() {
    const cy = H * 0.30;
    const isBest = height >= best && height > 0;
    ctx.globalAlpha = Math.min(1, (performance.now() - deadAt) / 260);
    type('CAPSIZED', W / 2, cy - 8, RED, 46, 800, 5);
    hairline(cy + 22, 200, 0.13);
    type(String(height), W / 2, cy + 70, ink(0.93), 74, 800, 0);
    type(isBest ? '★  NEW BEST HAUL' : 'CARGO SHIPPED', W / 2, cy + 118, isBest ? GOLD : ink(0.36), 9, 700, 2);
    statStrip([
      ['SCORE', String(displayScore)],
      ['CARGO', String(height)],
      ['BEST', String(best)],
    ], cy + 162);
    if (performance.now() - deadAt > 800 && blink()) type('PRESS TO SAIL AGAIN', W / 2, cy + 232, ink(0.85), 13, 800, 3);
    ctx.globalAlpha = 1;
  }

  function draw() {
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);

    // a whisper of green wash on a clean placement
    if (bankFx > 0) { ctx.fillStyle = `rgba(11,122,83,${bankFx * 0.05})`; ctx.fillRect(0, 0, W, H); }

    let sx = 0, sy = 0;
    if (shake > 0) { sx = (Math.random() - 0.5) * shake * 22; sy = (Math.random() - 0.5) * shake * 22; }
    const wlY = pivotScreenY + sy + (effWL() - camY) * zoom;   // where the sea meets the screen

    ctx.save();
    ctx.translate(W / 2 + sx, pivotScreenY + sy);
    ctx.scale(zoom, zoom);
    ctx.translate(0, -camY);
    drawWorld();
    ctx.restore();

    // Water goes on last, translucent — so the dipped-under hull and any spilled cargo read as
    // submerged, and the whole thing floods over on death.
    drawWater(wlY);

    drawVignette();
    if (saveFlash > 0) { ctx.fillStyle = `rgba(255,255,255,${saveFlash * 0.35})`; ctx.fillRect(0, 0, W, H); }

    if (state === MENU) drawMenu();
    if (state === PLAY) drawHud();
    if (state === DEAD) drawGameOver();
  }

  // ---------- loop ----------
  for (let i = 0; i < 90; i++) boxSprite(colorFor(i));   // decode the crate sprites up front
  buildMenu();
  let last = performance.now();
  function frame(now) {
    const dt = Math.min((now - last) / 1000, 0.05);
    last = now;
    update(dt);
    draw();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
